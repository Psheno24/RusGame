services:
  app:
    build: .
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./data:/app/data
    expose:
      - "3001"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3001/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      # Если на сервере несколько IP (Xray на одном, игра на другом) — задайте SITE_BIND_IP в .env
      - "${SITE_BIND_IP:-0.0.0.0}:80:80"
      - "${SITE_BIND_IP:-0.0.0.0}:443:443"
    env_file: .env
    environment:
      # Явно пробрасываем домен — иначе Caddy может подхватить мусор из окружения
      SITE_DOMAIN: ${SITE_DOMAIN:?Задайте SITE_DOMAIN в .env}
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      app:
        condition: service_healthy

volumes:
  caddy-data:
  caddy-config:
